const DB_NAME = "hisab_offline_db";
const STORE = "customers";

function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, 1);

    request.onupgradeneeded = function (e) {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) {
        db.createObjectStore(STORE, { keyPath: "id", autoIncrement: true });
      }
    };

    request.onsuccess = e => resolve(e.target.result);
    request.onerror = e => reject(e);
  });
}

async function addOfflineCustomer(data) {
  const db = await openDB();
  const tx = db.transaction(STORE, "readwrite");
  tx.objectStore(STORE).add({
    ...data,
    synced: false,
    createdAt: Date.now()
  });
  }
  window.addEventListener("offline", () => {
  console.log("OFFLINE MODE ON");
});

window.addEventListener("online", () => {
  console.log("ONLINE MODE → SYNC START");
  syncOfflineData();
});
  async function syncOfflineData() {
  const db = await openDB();
  const tx = db.transaction(STORE, "readonly");
  const store = tx.objectStore(STORE);

  const all = store.getAll();

  all.onsuccess = async function () {
    const data = all.result;

    for (const item of data) {
      if (!item.synced) {
        try {
          await firebase.firestore().collection("customers").add({
            name: item.name,
            phone: item.phone,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });

          // mark synced
          item.synced = true;

          const tx2 = db.transaction(STORE, "readwrite");
          tx2.objectStore(STORE).put(item);

        } catch (e) {
          console.log("sync failed", e);
        }
      }
    }
  };
      }

  });
  }

async function findUserUidByPhone(phone) {
  // phone থেকে uid বের করার জন্য users collection scan
  // (সাধারণত auth user list দেখা যায় না client-side, তাই
  //  আমরা phone কে 'fake email' হিসেবে ব্যবহার করতে পারি অথবা
  //  একটা mapping collection রাখতে পারি — নিচে দেখো)
  const normalized = phone.replace(/\D/g, '');
  // users collection scan
  const snap = await db.collection('users').get();
  for (const doc of snap.docs) {
    const data = doc.data();
    if (data.shop && data.shop.phone) {
      const localPhone = data.shop.phone.replace(/\D/g, '');
      if (localPhone === normalized || localPhone.endsWith(normalized) || normalized.endsWith(localPhone)) {
        return doc.id;
      }
    }
  }
  return null;
}

async function findOrCreateRequestDoc(phone, days, trx) {
  // pending_requests collection — admin approve queue
  const reqs = await db.collection('pending_requests')
    .where('phone', '==', phone)
    .where('trx', '==', trx)
    .where('status', '==', 'pending')
    .get();
  if (!reqs.empty) return reqs.docs[0];

  const newDoc = await db.collection('pending_requests').add({
    phone: phone,
    days: days,
    trx: trx,
    status: 'pending',
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    createdBy: currentUser.email
  });
  return await newDoc.get();
}

window.doApprove = async function () {
  const btn = document.getElementById('approveBtn');
  if (btn.disabled) return;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Approve হচ্ছে...';

  try {
    // 1. user খুঁজি phone দিয়ে
    const uid = await findUserUidByPhone(phoneParam);

    // 2. pending request doc তৈরি/খুঁজি
    const reqDoc = await findOrCreateRequestDoc(phoneParam, daysParam, trxParam);

    if (uid) {
      // 3. user এর subscription update
      const userRef = db.collection('users').doc(uid);
      const userSnap = await userRef.get();
      const userData = userSnap.exists ? userSnap.data() : {};
      const currentSub = userData.subscription || {};
      const now = Date.now();

      // base expiry: current যদি future এ থাকে, সেটার উপর add করি
      const baseExp = (currentSub.expiry && currentSub.expiry > now) ? currentSub.expiry : now;
      const newExpiry = baseExp + daysParam * 86400000;

      await userRef.set({
        subscription: {
          expiry: newExpiry,
          plan: daysParam <= 30 ? '1month' : '4month',
          lastTrx: trxParam,
          createdAt: currentSub.createdAt || now,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          approvedBy: currentUser.email,
          approvedAt: firebase.firestore.FieldValue.serverTimestamp()
        },
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });

      // pending request update
      await reqDoc.ref.update({
        status: 'approved',
        uid: uid,
        processedAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      // Activity log
      await db.collection('admin_logs').add({
        action: 'approve',
        adminEmail: currentUser.email,
        phone: phoneParam,
        trx: trxParam,
        days: daysParam,
        uid: uid,
        at: firebase.firestore.FieldValue.serverTimestamp()
      });

      // Success UI + WhatsApp link
      showApprovedUI(uid);
    } else {
      // user app এ login করেনি এখনো — pending এ রাখি
      await reqDoc.ref.update({
        status: 'awaiting_user',
        processedAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      await db.collection('admin_logs').add({
        action: 'approve_pending_user',
        adminEmail: currentUser.email,
        phone: phoneParam,
        trx: trxParam,
        days: daysParam,
        at: firebase.firestore.FieldValue.serverTimestamp()
      });

      showApprovedPendingUserUI();
    }
  } catch (e) {
    console.error(e);
    btn.disabled = false;
    btn.innerHTML = '✅ Approve করুন';
    alert('Approve ব্যর্থ: ' + e.message);
  }
};

// ===== Pending requests history =====
async function loadPendingRequests() {
  const mount = document.getElementById('historyMount');
  if (!mount) return;
  try {
    const snap = await db.collection('pending_requests')
      .where('status', 'in', ['pending', 'awaiting_user'])
      .orderBy('createdAt', 'desc')
      .limit(10)
      .get();

    if (snap.empty) return;

    let html = `<div class="history"><h3>📋 Pending requests (${snap.size})</h3>`;
    snap.forEach(doc => {
      const r = doc.data();
      html += `
        <div class="history-item">
          <div class="left">
            <span class="phone">${r.phone}</span>
            <span class="trx">${r.trx}</span>
          </div>
          <span class="days">${bn(r.days)} দিন</span>
        </div>
      `;
    });
    html += `</div>`;
    mount.innerHTML = html;
  } catch (e) {
    console.warn('history load failed', e);
  }
}
</script>

<script>
// ===== ADD CUSTOMER =====
window.addCustomer = async function(name, phone) {
  if (!name || !phone) return alert("সব তথ্য দিন");

  await db.collection("customers").add({
    name: name,
    phone: phone,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  loadCustomers();
};

// ===== LOAD CUSTOMER =====
window.loadCustomers = async function() {
  const snap = await db.collection("customers")
    .orderBy("createdAt", "desc")
    .get();

  let html = "";

  snap.forEach(doc => {
    const c = doc.data();
    html += `
      <div style="background:#f3f4f6;padding:10px;margin:5px;border-radius:10px">
        <b>${c.name}</b><br>
        📞 ${c.phone}
      </div>
    `;
  });

  document.getElementById("customerList").innerHTML = html;
};
</script>
