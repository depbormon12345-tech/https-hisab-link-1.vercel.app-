<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>হিসাব লেখা — Admin Approve</title>

<!-- Firebase Compat SDK -->
<script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.card {
  background: #fff; border-radius: 20px; padding: 28px 24px;
  max-width: 440px; width: 100%;
  box-shadow: 0 10px 40px rgba(0,0,0,0.25);
}
.logo { font-size: 40px; text-align: center; margin-bottom: 6px; }
h1 { text-align: center; font-size: 22px; font-weight: 800; color: #1d4ed8; margin-bottom: 4px; }
.sub { text-align: center; font-size: 13px; color: #6b7280; margin-bottom: 20px; }

.info-box {
  background: #f9fafb; border-radius: 12px; padding: 16px;
  margin: 14px 0; border: 1px solid #e5e7eb;
}
.info-row {
  display: flex; justify-content: space-between; padding: 10px 0;
  border-bottom: 1px solid #f3f4f6; font-size: 14px;
}
.info-row:last-child { border-bottom: none; }
.info-label { color: #6b7280; }
.info-val { font-weight: 700; color: #111827; text-align: right; max-width: 60%; word-break: break-all; }

.btn {
  width: 100%; padding: 14px; border: none; border-radius: 14px;
  font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px;
  transition: all 0.15s;
}
.btn:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-approve { background: linear-gradient(135deg, #16a34a, #15803d); color: #fff; }
.btn-approve:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(22,163,74,0.3); }
.btn-reject { background: #fee2e2; color: #dc2626; }
.btn-reject:hover:not(:disabled) { background: #fecaca; }
.btn-secondary { background: #f3f4f6; color: #374151; }

.success { text-align: center; padding: 16px 0; }
.success-icon { font-size: 56px; margin-bottom: 12px; }
.success-title { font-size: 22px; font-weight: 800; color: #16a34a; margin-bottom: 6px; }
.success-sub { font-size: 14px; color: #6b7280; margin-bottom: 16px; }
.wa-link {
  display: block; background: #25D366; color: #fff; text-align: center;
  padding: 14px; border-radius: 14px; font-weight: 700;
  text-decoration: none; margin-top: 14px; font-size: 15px;
}
.wa-link.reject { background: #dc2626; }

.msg-err, .msg-info, .msg-warn {
  text-align: center; padding: 14px; font-size: 14px;
  border-radius: 10px; margin: 10px 0;
}
.msg-err  { color: #dc2626; background: #fee2e2; }
.msg-info { color: #1d4ed8; background: #dbeafe; }
.msg-warn { color: #d97706; background: #fef3c7; }

.history { margin-top: 20px; }
.history h3 { font-size: 14px; color: #6b7280; margin-bottom: 8px; padding-left: 4px; }
.history-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 12px; background: #f9fafb; border-radius: 10px;
  margin-bottom: 6px; font-size: 13px;
}
.history-item .left { display: flex; flex-direction: column; gap: 2px; }
.history-item .phone { font-weight: 700; color: #111827; }
.history-item .trx { color: #6b7280; font-size: 11px; font-family: monospace; }
.history-item .days { background: #dcfce7; color: #16a34a; padding: 4px 10px; border-radius: 20px; font-weight: 700; font-size: 12px; }

.admin-bar {
  background: linear-gradient(135deg, #1e3a8a, #1d4ed8);
  color: #fff; padding: 10px 16px; border-radius: 12px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; font-size: 13px;
}
.admin-bar .logout {
  background: rgba(255,255,255,0.2); border: none; color: #fff;
  padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
}

.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
  border-radius: 50%; animation: spin 0.8s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">

  <div id="adminBar" style="display:none" class="admin-bar">
    <span>👤 <span id="adminEmail">-</span></span>
    <button class="logout" onclick="doLogout()">Logout</button>
  </div>

  <div class="logo">📒</div>
  <h1>হিসাব লেখা</h1>
  <p class="sub">সাবস্ক্রিপশন Approve প্যানেল (Admin)</p>

  <div id="content">
    <div style="text-align:center;padding:30px;color:#6b7280">
      <span class="spinner" style="border-color:rgba(0,0,0,0.2);border-top-color:#6b7280"></span>
      লোড হচ্ছে...
    </div>
  </div>

</div>

<script>
// ===== Config =====
const firebaseConfig = {
  apiKey: "AIzaSyDaydixwJBYqnvANlVOeuZ2686V5813Cls",
  authDomain: "dokan-hisab-35ca7.firebaseapp.com",
  projectId: "dokan-hisab-35ca7",
  storageBucket: "dokan-hisab-35ca7.firebasestorage.app",
  messagingSenderId: "549298306650",
  appId: "1:549298306650:web:1e40c400f50b982b20e263"
};

// ✅ শুধু এই Gmail approve করতে পারবে
const ADMIN_EMAILS = ["depbormon12345@gmail.com"];

// ===== URL params =====
const params    = new URLSearchParams(window.location.search);
const phoneParam = params.get('phone') || '';
const daysParam  = parseInt(params.get('days')) || 0;
const trxParam   = params.get('trx') || '';

let currentUser = null;
let db = null, auth = null;

// ===== Helpers =====
function bn(n) { return String(n).replace(/[0-9]/g, d => '০১২৩৪৫৬৭৮৯'[d]); }
function $(id) { return document.getElementById(id); }

// ===== Firebase init =====
function whenFirebaseReady(cb) {
  (function poll() {
    if (window.firebase && firebase.auth && firebase.firestore) cb();
    else setTimeout(poll, 50);
  })();
}

whenFirebaseReady(function () {
  firebase.initializeApp(firebaseConfig);
  auth = firebase.auth();
  db   = firebase.firestore();
  auth.languageCode = 'bn';

  auth.onAuthStateChanged(function (user) {
    currentUser = user;
    if (user) {
      if (!ADMIN_EMAILS.includes(user.email)) {
        $('content').innerHTML = `
          <div class="msg-err">
            <strong>⛔ অ্যাক্সেস নেই</strong><br><br>
            আপনার email (<code>${user.email}</code>) admin list এ নেই।
          </div>
          <button class="btn btn-secondary" onclick="doLogout()">Logout</button>
        `;
        return;
      }
      $('adminBar').style.display = 'flex';
      $('adminEmail').textContent = user.email;
      render();
    } else {
      $('adminBar').style.display = 'none';
      showLoginScreen();
    }
  });
});

// ===== Login =====
function showLoginScreen() {
  $('content').innerHTML = `
    <div class="msg-info" style="margin-bottom:16px">
      👋 Admin login করুন (Google account)
    </div>
    <button class="btn btn-approve" onclick="loginGoogle()">
      🔐 Google দিয়ে Login
    </button>
  `;
}

window.loginGoogle = function () {
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ prompt: 'select_account' });
  auth.signInWithPopup(provider).catch(function (e) {
    alert('Login failed: ' + e.message);
  });
};

window.doLogout = function () { auth.signOut(); };

// ===== Render approve panel =====
function render() {
  if (!phoneParam || !daysParam || !trxParam) {
    $('content').innerHTML = `
      <div class="msg-err">❌ URL সঠিক নয় — phone, days ও trx থাকতে হবে।</div>
    `;
    return;
  }

  const planLabel = daysParam <= 30 ? '১ মাস (৳৫০)' : '৪ মাস (৳১৮০)';
  const amt = daysParam <= 30 ? 50 : 180;

  $('content').innerHTML = `
    <div class="info-box">
      <div class="info-row"><span class="info-label">📞 ফোন</span><span class="info-val">${phoneParam}</span></div>
      <div class="info-row"><span class="info-label">🧾 TrxID</span><span class="info-val">${trxParam}</span></div>
      <div class="info-row"><span class="info-label">📦 প্ল্যান</span><span class="info-val">${planLabel}</span></div>
      <div class="info-row"><span class="info-label">💰 পরিমাণ</span><span class="info-val">৳${amt}</span></div>
      <div class="info-row"><span class="info-label">📅 দিন</span><span class="info-val">${bn(daysParam)} দিন</span></div>
    </div>
    <button class="btn btn-approve" id="approveBtn" onclick="doApprove()">✅ Approve করুন</button>
    <button class="btn btn-reject"  id="rejectBtn"  onclick="doReject()">❌ বাতিল করুন</button>
    <div id="historyMount"></div>
  `;
  loadPendingRequests();
}

// ===== Find user UID by phone =====
async function findUserUidByPhone(phone) {
  const normalized = phone.replace(/\D/g, '');
  const snap = await db.collection('users').get();
  for (const doc of snap.docs) {
    const data = doc.data();
    if (data.shop && data.shop.phone) {
      const p = data.shop.phone.replace(/\D/g, '');
      if (p === normalized || p.endsWith(normalized) || normalized.endsWith(p)) {
        return doc.id;
      }
    }
  }
  return null;
}

// ===== Find or create pending request doc =====
async function findOrCreateRequestDoc() {
  const reqs = await db.collection('pending_requests')
    .where('phone', '==', phoneParam)
    .where('trx',   '==', trxParam)
    .where('status','==', 'pending')
    .get();
  if (!reqs.empty) return reqs.docs[0];

  const ref = await db.collection('pending_requests').add({
    phone: phoneParam,
    days: daysParam,
    trx: trxParam,
    status: 'pending',
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    createdBy: currentUser.email
  });
  return await ref.get();
}

// ===== Approve =====
window.doApprove = async function () {
  const btn = $('approveBtn');
  if (btn.disabled) return;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Approve হচ্ছে...';

  try {
    const uid    = await findUserUidByPhone(phoneParam);
    const reqDoc = await findOrCreateRequestDoc();

    if (uid) {
      // user found — subscription update করো
      const userRef  = db.collection('users').doc(uid);
      const userSnap = await userRef.get();
      const currentSub = (userSnap.exists && userSnap.data().subscription) || {};
      const now     = Date.now();
      const baseExp = (currentSub.expiry && currentSub.expiry > now) ? currentSub.expiry : now;
      const newExpiry = baseExp + daysParam * 86400000;

      await userRef.set({
        subscription: {
          expiry: newExpiry,
          plan: daysParam <= 30 ? '1month' : '4month',
          lastTrx: trxParam,
          createdAt: currentSub.createdAt || now,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          approvedBy: currentUser.email,
          approvedAt: firebase.firestore.FieldValue.serverTimestamp()
        },
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });

      await reqDoc.ref.update({
        status: 'approved',
        uid: uid,
        processedAt: firebase.firestore.FieldValue.serverTimestamp(),
        processedBy: currentUser.email
      });

      await db.collection('admin_logs').add({
        action: 'approve', adminEmail: currentUser.email,
        phone: phoneParam, trx: trxParam, days: daysParam, uid: uid,
        at: firebase.firestore.FieldValue.serverTimestamp()
      });

      showApprovedUI();

    } else {
      // user এখনো login করেনি — awaiting_user
      await reqDoc.ref.update({
        status: 'awaiting_user',
        processedAt: firebase.firestore.FieldValue.serverTimestamp(),
        processedBy: currentUser.email
      });

      await db.collection('admin_logs').add({
        action: 'approve_pending_user', adminEmail: currentUser.email,
        phone: phoneParam, trx: trxParam, days: daysParam,
        at: firebase.firestore.FieldValue.serverTimestamp()
      });

      showApprovedPendingUserUI();
    }
  } catch (e) {
    console.error(e);
    btn.disabled = false;
    btn.innerHTML = '✅ Approve করুন';
    alert('Approve ব্যর্থ: ' + e.message);
  }
};

// ===== Reject =====
window.doReject = async function () {
  if (!confirm('এই পেমেন্ট বাতিল করতে চান?')) return;
  try {
    await db.collection('pending_requests').add({
      phone: phoneParam, days: daysParam, trx: trxParam,
      status: 'rejected',
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      processedAt: firebase.firestore.FieldValue.serverTimestamp(),
      processedBy: currentUser.email
    });

    await db.collection('admin_logs').add({
      action: 'reject', adminEmail: currentUser.email,
      phone: phoneParam, trx: trxParam,
      at: firebase.firestore.FieldValue.serverTimestamp()
    });

    showRejectedUI();
  } catch (e) {
    alert('ব্যর্থ: ' + e.message);
  }
};

// ===== UI states =====
function showApprovedUI() {
  const planLabel = daysParam <= 30 ? '১ মাস' : '৪ মাস';
  const waNum = phoneParam.startsWith('0') ? '88' + phoneParam : phoneParam;
  const msg = `✅ *হিসাব লেখা Activated!*\n\nআপনার সাবস্ক্রিপশন (${planLabel}) চালু হয়েছে।\n\n📱 App টি Reopen করুন — ${daysParam} দিন active।`;
  const waUrl = `https://wa.me/${waNum}?text=${encodeURIComponent(msg)}`;

  $('content').innerHTML = `
    <div class="success">
      <div class="success-icon">✅</div>
      <div class="success-title">Approved!</div>
      <div class="success-sub">${phoneParam} — ${bn(daysParam)} দিন active</div>
      <div class="msg-info" style="margin-top:14px">🎉 User app reopen করলেই instant activate হবে!</div>
    </div>
    <a href="${waUrl}" target="_blank" class="wa-link">📲 WhatsApp এ জানান</a>
    <button class="btn btn-secondary" onclick="render()" style="margin-top:8px">← ফিরে যান</button>
  `;
  loadPendingRequests();
}

function showApprovedPendingUserUI() {
  $('content').innerHTML = `
    <div class="success">
      <div class="success-icon">⏳</div>
      <div class="success-title">Pending এ রাখা হলো</div>
      <div class="success-sub">${phoneParam}</div>
      <div class="msg-warn" style="margin-top:14px">
        ⚠️ User এখনো app এ login করেনি।<br>
        সে login করলে subscription automatically activate হবে।
      </div>
    </div>
    <button class="btn btn-secondary" onclick="render()" style="margin-top:8px">← ফিরে যান</button>
  `;
}

function showRejectedUI() {
  const waNum = phoneParam.startsWith('0') ? '88' + phoneParam : phoneParam;
  const msg = `❌ *হিসাব লেখা পেমেন্ট বাতিল*\n\nআপনার TrxID (${trxParam}) যাচাই করা যায়নি।\nসঠিক TrxID দিয়ে আবার পেমেন্ট করুন।`;
  const waUrl = `https://wa.me/${waNum}?text=${encodeURIComponent(msg)}`;

  $('content').innerHTML = `
    <div class="success">
      <div class="success-icon">❌</div>
      <div class="success-title" style="color:#dc2626">বাতিল করা হয়েছে</div>
    </div>
    <a href="${waUrl}" target="_blank" class="wa-link reject">📲 User কে জানান</a>
    <button class="btn btn-secondary" onclick="render()" style="margin-top:8px">← ফিরে যান</button>
  `;
}

// ===== Pending requests list =====
async function loadPendingRequests() {
  const mount = $('historyMount');
  if (!mount) return;
  try {
    const snap = await db.collection('pending_requests')
      .where('status', 'in', ['pending', 'awaiting_user'])
      .orderBy('createdAt', 'desc')
      .limit(10)
      .get();

    if (snap.empty) { mount.innerHTML = ''; return; }

    let html = `<div class="history"><h3>📋 Pending requests (${snap.size})</h3>`;
    snap.forEach(doc => {
      const r = doc.data();
      html += `
        <div class="history-item">
          <div class="left">
            <span class="phone">${r.phone}</span>
            <span class="trx">${r.trx}</span>
          </div>
          <span class="days">${bn(r.days)} দিন</span>
        </div>
      `;
    });
    html += `</div>`;
    mount.innerHTML = html;
  } catch (e) {
    console.warn('history load failed', e);
  }
}
</script>
</body>
</html>
